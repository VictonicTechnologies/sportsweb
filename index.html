<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Victonic Sports - Smart Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>
:root {
    --color-bg-dark: #0a0f24;
    --color-primary: #f97316; 
    --color-secondary: #3b82f6; 
    --color-text-muted: #e2e8f0;
    --color-text-dim: #94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Montserrat',sans-serif;
    background: radial-gradient(circle at 50% 50%, #172554 0%, #0a0f24 70%, #020617 100%);
    color:white;
    /* Use dvh for perfect mobile sizing, fallback to vh */
    height: 100vh;
    height: 100dvh; 
    overflow: hidden;
    width: 100vw;
}

.background{position:fixed;inset:0;z-index:1; overflow: hidden;}

.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(60px);
    animation: float 6s ease-in-out infinite alternate;
}

.circle-1{
    width: clamp(200px, 50vw, 300px);
    height: clamp(200px, 50vw, 300px);
    background:radial-gradient(circle,rgba(59,130,246,.25),transparent 70%);
    top:-50px;left:-50px;
}

.circle-2{
    width: clamp(250px, 60vw, 350px);
    height: clamp(250px, 60vw, 350px);
    background:radial-gradient(circle,rgba(249,115,22,.2),transparent 70%);
    bottom:-100px;right:-50px;
    animation-delay: -3s;
}

@keyframes float {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(20px, 20px) scale(1.1); }
}

.main-content{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height: 100%;
    width: 100%;
    padding: 20px;
}

.app-name{
    position:absolute;
    top: 12%;
    left:50%;
    transform:translateX(-50%) translateY(-20px);
    /* Fluid typography for mobile */
    font-size: clamp(24px, 7vw, 38px);
    font-weight:900;
    text-transform: uppercase;
    letter-spacing: 2px;
    background: linear-gradient(to right, #60a5fa, #f97316);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    opacity:0;
    white-space: nowrap;
}

.icon-container {
    position: relative;
    margin-top: -30px;
}

.icon-glow{
    position:absolute;
    width: clamp(120px, 35vw, 160px);
    height: clamp(120px, 35vw, 160px);
    background:radial-gradient(circle,rgba(249,115,22,.6),transparent 70%);
    border-radius:50%;
    filter:blur(25px);
    transform:scale(.5);
    opacity:0;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.5);
    animation: pulseGlow 2s infinite alternate;
}

.icon-outer{
    width: clamp(90px, 25vw, 110px);
    height: clamp(90px, 25vw, 110px);
    background:linear-gradient(145deg,#1e3a8a,#2563eb);
    border-radius: 25px;
    border: 4px solid #60a5fa;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size: clamp(40px, 10vw, 50px);
    transform:scale(.5);
    opacity:0;
    box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    position: relative;
    z-index: 10;
}

@keyframes pulseGlow {
    0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
    100% { transform: translate(-50%, -50%) scale(1.2); opacity: 0.8; }
}

.tagline{
    margin-top: clamp(30px, 8vw, 45px);
    font-size: clamp(16px, 4.5vw, 18px);
    font-weight:800;
    color:#f97316;
    letter-spacing: 1px;
    opacity:0;
    transform: translateY(20px);
    text-align: center;
}

.slogan{
    margin-top: 8px;
    font-size: clamp(13px, 3.5vw, 15px);
    color:var(--color-text-muted);
    min-height: 20px;
    opacity:0;
    text-align:center;
    font-weight: 600;
    transform: translateY(20px);
}

/* New Button for Mobile Fallback */
.action-btn {
    margin-top: 30px;
    padding: 14px 32px;
    background: linear-gradient(135deg, #f97316, #ea580c);
    color: white;
    text-decoration: none;
    font-weight: 800;
    font-size: 15px;
    border-radius: 50px;
    box-shadow: 0 8px 20px rgba(249, 115, 22, 0.4);
    opacity: 0;
    transform: translateY(20px);
    transition: transform 0.2s, box-shadow 0.2s;
    letter-spacing: 1px;
    text-transform: uppercase;
}

.action-btn:active {
    transform: scale(0.95) translateY(20px);
}

.version{
    position:absolute;
    bottom: 25px;
    left:50%;
    transform:translateX(-50%);
    font-size: 11px;
    font-weight: 600;
    color:var(--color-text-dim);
    opacity:0;
    letter-spacing: 2px;
    white-space: nowrap;
}

.flash{
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    z-index:9999;
    pointer-events: none;
}
</style>
</head>

<body>

<div class="background">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
</div>

<div class="flash" id="flash"></div>

<div class="main-content">
    <div class="app-name" id="appName"></div>

    <div class="icon-container">
        <div class="icon-glow" id="iconGlow"></div>
        <div class="icon-outer" id="iconOuter">📊</div>
    </div>

    <div class="tagline" id="tagline">Intelligent Sports Analysis</div>
    <div class="slogan" id="slogan"></div>
    
    <!-- Button appears if auto-redirect is blocked by browser -->
    <a href="#" id="actionBtn" class="action-btn">Open Play Store</a>

    <div class="version" id="version">VICTONIC SPORTS v1.0</div>
</div>

<script>
// Official Android Intent URI (Bypasses many browser blocks, falls back to web automatically)
const INTENT_LINK = "intent://details?id=com.earn.earnsurveys.surveyiss#Intent;scheme=market;package=com.android.vending;S.browser_fallback_url=https%3A%2F%2Fplay.google.com%2Fstore%2Fapps%2Fdetails%3Fid%3Dcom.earn.earnsurveys.surveyiss;end";
const WEB_LINK = "https://play.google.com/store/apps/details?id=com.earn.earnsurveys.surveyiss";

function show(el, delay=0, duration=400, transform="scale(1) translateY(0)"){
 return new Promise(r=>{
  setTimeout(()=>{
   el.style.transition=`all ${duration}ms cubic-bezier(0.175, 0.885, 0.32, 1.275)`;
   el.style.opacity=1;
   el.style.transform=transform;
   setTimeout(r,duration);
  }, delay);
 });
}

function typeFast(el,text){
 return new Promise(r=>{
  let i=0;
  const t=setInterval(()=>{
   el.textContent+=text[i++];
   if(i>=text.length){clearInterval(t);r();}
  }, 35); 
 });
}

async function run(){
 const appName=document.getElementById('appName');
 const iconGlow=document.getElementById('iconGlow');
 const iconOuter=document.getElementById('iconOuter');
 const tagline=document.getElementById('tagline');
 const slogan=document.getElementById('slogan');
 const actionBtn=document.getElementById('actionBtn');
 const version=document.getElementById('version');
 const flash=document.getElementById('flash');

 // Set the button's actual link so clicking it always works
 actionBtn.href = WEB_LINK;
 actionBtn.onclick = function(e) {
     e.preventDefault();
     window.location.href = INTENT_LINK; // Force intent on click
 };

 // 1. INSTANT AUTO-LAUNCH (Using Intent)
 window.location.replace(INTENT_LINK);

 // 2. ANIMATE UI (In case the launch takes time or is blocked by Safari/Desktop/Reloads)
 flash.style.opacity=.8;
 await new Promise(r=>setTimeout(r,50));
 flash.style.opacity=0;

 await typeFast(appName,"VICTONIC SPORTS");
 show(appName, 0, 300, "translateX(-50%) translateY(0)");

 show(iconGlow, 50, 500);
 await show(iconOuter, 100, 600);
 
 await show(tagline, 50, 400);
 slogan.textContent="Data-Powered Forecasts • Real-time Insights";
 await show(slogan, 50, 400);

 // Show the button instead of a spinner, ensuring the user can click if blocked
 show(actionBtn, 100, 400);
 show(version, 200, 400);

 // 3. FALLBACK DESKTOP REDIRECT (Wait 2.5 seconds, if still here, send to web)
 setTimeout(()=>{
    if(document.hasFocus()) {
       window.location.href = WEB_LINK;
    }
 }, 2500); 
}

window.onload=run;
</script>

</body>
</html>
