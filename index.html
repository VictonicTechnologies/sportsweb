<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Victonic Sports — Smart Sports Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg-0:#0b3b2b;
  --bg-1:#06231a;
  --bg-2:#03100b;
  --emerald:#10b981;
  --emerald-bright:#34d399;
  --cyan:#22d3ee;
  --lime:#bef264;
  --cloud:#ecfdf5;
  --muted:#6ee7b7;
  --dim:#3f9e7e;
}

*{margin:0;padding:0;box-sizing:border-box}

html,body{height:100%}

body{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at 50% 22%, var(--bg-0) 0%, var(--bg-1) 46%, var(--bg-2) 100%);
  color:var(--cloud);
  overflow:hidden;
  height:100dvh;
  -webkit-font-smoothing:antialiased;
}

/* ---------- ambient background ---------- */
.bg{position:fixed;inset:0;z-index:1;overflow:hidden}

/* faint analytics grid */
.grid{
  position:absolute;inset:-2px;
  background-image:
    linear-gradient(rgba(110,231,183,.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(110,231,183,.06) 1px, transparent 1px);
  background-size:46px 46px;
  mask-image:radial-gradient(circle at 50% 38%, #000 0%, transparent 72%);
  -webkit-mask-image:radial-gradient(circle at 50% 38%, #000 0%, transparent 72%);
  opacity:0;
  animation:gridIn 1.4s ease .2s forwards, gridDrift 26s linear infinite;
}
@keyframes gridIn{to{opacity:1}}
@keyframes gridDrift{from{background-position:0 0,0 0}to{background-position:46px 46px,46px 46px}}

/* drifting glow orbs */
.orb{position:absolute;border-radius:50%;filter:blur(46px);opacity:.5}
.orb-1{width:240px;height:240px;top:8%;left:-60px;
  background:radial-gradient(circle,rgba(16,185,129,.55),transparent 70%);
  animation:float1 12s ease-in-out infinite}
.orb-2{width:280px;height:280px;bottom:6%;right:-70px;
  background:radial-gradient(circle,rgba(34,211,238,.4),transparent 70%);
  animation:float2 15s ease-in-out infinite}
.orb-3{width:180px;height:180px;top:46%;left:58%;
  background:radial-gradient(circle,rgba(190,242,100,.22),transparent 70%);
  animation:float1 18s ease-in-out infinite reverse}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(26px,-34px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,28px)}}

/* floating data particles */
.particle{position:absolute;width:5px;height:5px;border-radius:50%;
  background:var(--emerald-bright);box-shadow:0 0 10px var(--emerald-bright);
  opacity:0;animation:rise linear infinite}
@keyframes rise{
  0%{opacity:0;transform:translateY(20px) scale(.6)}
  12%{opacity:.7}
  85%{opacity:.5}
  100%{opacity:0;transform:translateY(-120px) scale(1)}
}

/* big background forecast line that draws itself */
.forecast-bg{position:absolute;inset:0;width:100%;height:100%;
  opacity:0;animation:gridIn 1s ease .5s forwards}
.forecast-bg path{
  fill:none;stroke:url(#bgline);stroke-width:2;
  stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:1400;stroke-dashoffset:1400;
  filter:drop-shadow(0 0 8px rgba(34,211,238,.5));
  animation:draw 2.4s ease .6s forwards}
@keyframes draw{to{stroke-dashoffset:0}}
.forecast-bg .line2{stroke:rgba(110,231,183,.22);stroke-width:1.5;
  filter:none;animation:draw 2.6s ease 1s forwards}
.forecast-bg .travel{fill:var(--lime);
  filter:drop-shadow(0 0 8px var(--lime)) drop-shadow(0 0 16px var(--lime))}

/* ---------- foreground ---------- */
.stage{position:relative;z-index:2;height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center}

.eyebrow{
  font-family:'Sora',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.5em;text-transform:uppercase;color:var(--muted);
  opacity:0;transform:translateY(8px);
  animation:up .6s ease .35s forwards;margin-bottom:30px;padding-left:.5em}

/* badge / logo */
.badge-wrap{position:relative;width:108px;height:108px;margin-bottom:30px;
  animation:floatBadge 4.5s ease-in-out 1.5s infinite}
@keyframes floatBadge{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
.pulse{position:absolute;inset:0;border-radius:28px;border:1.5px solid var(--emerald-bright);
  opacity:0;animation:pulseRing 2.9s ease-out 1.8s infinite}
@keyframes pulseRing{0%{opacity:.55;transform:scale(1)}80%{opacity:0;transform:scale(2)}100%{opacity:0}}
.badge-glow{position:absolute;inset:-26px;border-radius:50%;
  background:radial-gradient(circle,rgba(16,185,129,.65),transparent 68%);
  filter:blur(20px);transform:scale(.5);opacity:0;
  animation:glowIn .7s ease .55s forwards, glowPulse 3.4s ease-in-out 1.4s infinite}
.ring{position:absolute;inset:-8px;border-radius:32px;
  border:1.5px solid rgba(110,231,183,.35);opacity:0;
  animation:glowIn .8s ease .75s forwards, ringSpin 14s linear 1.4s infinite}
.badge{position:absolute;inset:0;border-radius:28px;
  background:linear-gradient(150deg,#0d9488 0%,#10b981 50%,#22d3ee 130%);
  box-shadow:0 18px 40px -12px rgba(16,185,129,.55),
    inset 0 1px 0 rgba(255,255,255,.35);
  display:flex;align-items:center;justify-content:center;
  transform:scale(.4) rotate(-12deg);opacity:0;
  animation:badgeIn .75s cubic-bezier(.34,1.56,.64,1) .5s forwards}
.badge svg{width:60px;height:60px}
.badge .chart{fill:none;stroke:#04241a;stroke-width:4;
  stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:120;stroke-dashoffset:120;
  animation:draw 1s ease 1s forwards}
.badge .dot{fill:#04241a;opacity:0;animation:pop .35s ease forwards}
.badge .arrow{fill:#04241a;opacity:0;animation:up .4s ease 1.7s forwards}

@keyframes glowIn{to{opacity:.9;transform:scale(1)}}
@keyframes glowPulse{0%,100%{opacity:.55;transform:scale(.95)}50%{opacity:.95;transform:scale(1.06)}}
@keyframes ringSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes badgeIn{to{opacity:1;transform:scale(1) rotate(0)}}
@keyframes pop{to{opacity:1}}

/* wordmark */
.wordmark{font-family:'Sora',sans-serif;font-weight:800;
  font-size:clamp(38px,12vw,56px);line-height:.95;letter-spacing:-.02em;
  display:flex;gap:.01em}
.wordmark span{display:inline-block;opacity:0;transform:translateY(26px) rotate(6deg);
  background:linear-gradient(110deg,#ffffff 0%,#a7f3d0 28%,#ffffff 50%,#a7f3d0 72%,#ffffff 100%);
  background-size:300% 100%;
  -webkit-background-clip:text;background-clip:text;color:transparent;
  animation:letter .55s cubic-bezier(.2,.8,.2,1) forwards, gleam 3.8s ease 2.1s infinite}
@keyframes gleam{0%{background-position:130% 0}100%{background-position:-30% 0}}

.sports{font-family:'Sora',sans-serif;font-weight:600;
  font-size:clamp(13px,3.4vw,16px);letter-spacing:.62em;
  text-transform:uppercase;color:var(--cyan);margin-top:14px;padding-left:.62em;
  opacity:0;transform:translateY(10px);
  animation:up .6s ease 1.45s forwards}

/* slogans */
.slogan{margin-top:26px;font-size:14px;font-weight:500;color:var(--muted);
  height:20px;letter-spacing:.01em;opacity:0;transition:opacity .45s ease;
  animation:fadeIn .5s ease 1.85s forwards}

/* progress */
.progress{margin-top:34px;width:188px;height:4px;border-radius:99px;
  background:rgba(110,231,183,.16);overflow:hidden;position:relative;
  opacity:0;animation:fadeIn .5s ease 1.9s forwards}
.bar{position:absolute;inset:0;width:0;border-radius:99px;
  background:linear-gradient(90deg,var(--emerald),var(--cyan),var(--lime));
  box-shadow:0 0 12px rgba(34,211,238,.7);
  animation:fill 1.9s cubic-bezier(.45,.05,.2,1) 2s forwards}
.bar::after{content:"";position:absolute;top:0;right:0;width:40px;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.85));
  animation:shimmer 1s linear 2s infinite}
@keyframes fill{to{width:100%}}
@keyframes shimmer{0%{transform:translateX(-30px)}100%{transform:translateX(10px)}}

/* tap-to-launch CTA — the reliable, gesture-driven handoff */
.cta{margin-top:30px;display:inline-flex;align-items:center;gap:9px;
  font-family:'Sora',sans-serif;font-weight:600;font-size:14px;letter-spacing:.01em;
  color:#04241a;text-decoration:none;cursor:pointer;border:0;
  padding:13px 26px;border-radius:99px;
  background:linear-gradient(135deg,#34d399,#22d3ee);
  box-shadow:0 12px 30px -8px rgba(34,211,238,.6),inset 0 1px 0 rgba(255,255,255,.45);
  opacity:0;transform:translateY(10px);
  animation:up .6s ease 2.4s forwards, ctaPulse 2.6s ease-in-out 3.2s infinite}
.cta:active{transform:translateY(0) scale(.96)}
.cta svg{width:16px;height:16px}
@keyframes ctaPulse{0%,100%{box-shadow:0 12px 30px -8px rgba(34,211,238,.6),inset 0 1px 0 rgba(255,255,255,.45)}
  50%{box-shadow:0 12px 40px -6px rgba(34,211,238,.9),inset 0 1px 0 rgba(255,255,255,.45)}}

/* footer */
.footer{position:absolute;bottom:max(30px,env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%);text-align:center;
  opacity:0;animation:fadeIn .6s ease 2.3s forwards}
.footer .by{font-family:'Sora',sans-serif;font-size:11px;font-weight:600;
  letter-spacing:.22em;text-transform:uppercase;color:var(--dim)}
.footer .ver{font-size:10px;color:rgba(110,231,183,.4);margin-top:5px;letter-spacing:.06em}

/* transitions */
@keyframes up{to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{to{opacity:1}}
@keyframes letter{to{opacity:1;transform:translateY(0) rotate(0)}}

.flash{position:fixed;inset:0;z-index:9999;pointer-events:none;
  background:radial-gradient(circle at 50% 40%,#34d399,#10b981 60%,#0b3b2b);
  opacity:.55;animation:flashOut .5s ease forwards}
@keyframes flashOut{to{opacity:0}}
.flash.out{animation:flashIn .45s ease forwards}
@keyframes flashIn{to{opacity:1}}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:.01ms!important;animation-iteration-count:1!important;
    transition-duration:.01ms!important}
  .wordmark span,.badge,.badge-glow,.ring,.eyebrow,.sports,.slogan,.progress,.footer,.forecast-bg,.grid{opacity:1!important;transform:none!important}
  .bar{width:100%}
}
</style>
</head>
<body>

<div class="bg">
  <div class="grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <svg class="forecast-bg" viewBox="0 0 400 800" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bgline" x1="0" y1="1" x2="1" y2="0">
        <stop offset="0%" stop-color="#10b981" stop-opacity="0"/>
        <stop offset="35%" stop-color="#10b981" stop-opacity=".5"/>
        <stop offset="100%" stop-color="#22d3ee" stop-opacity=".9"/>
      </linearGradient>
    </defs>
    <path class="line2" d="M-20,700 L70,650 L150,680 L240,560 L320,590 L420,470"/>
    <path id="fpath" d="M-20,620 L60,560 L130,600 L210,470 L290,500 L360,360 L440,300"/>
    <circle class="travel" r="4.5">
      <animateMotion dur="3.4s" begin="2.8s" repeatCount="indefinite">
        <mpath href="#fpath"/>
      </animateMotion>
    </circle>
  </svg>

  <div id="particles"></div>
</div>

<div class="flash" id="flash"></div>

<main class="stage">
  <div class="eyebrow">Smart Sports Intelligence</div>

  <div class="badge-wrap">
    <span class="pulse"></span>
    <span class="pulse" style="animation-delay:3.2s"></span>
    <div class="badge-glow"></div>
    <div class="ring"></div>
    <div class="badge">
      <svg viewBox="0 0 48 48" aria-hidden="true">
        <polyline class="chart" points="8,36 19,28 28,31 40,12"/>
        <circle class="dot" cx="8"  cy="36" r="2.6" style="animation-delay:1.15s"/>
        <circle class="dot" cx="19" cy="28" r="2.6" style="animation-delay:1.35s"/>
        <circle class="dot" cx="28" cy="31" r="2.6" style="animation-delay:1.55s"/>
        <circle class="dot" cx="40" cy="12" r="3.4" style="animation-delay:1.75s"/>
        <path class="arrow" d="M40 12 L33 11 L39 6 Z"/>
      </svg>
    </div>
  </div>

  <div class="wordmark" id="wordmark" aria-label="Victonic"></div>
  <div class="sports">Sports</div>

  <div class="slogan" id="slogan">Daily insights &amp; forecasts</div>

  <div class="progress"><div class="bar"></div></div>

  <button class="cta" id="openBtn" type="button" aria-label="Open Victonic Sports in the Play Store">
    Open in Play Store
    <svg viewBox="0 0 24 24" fill="none" stroke="#04241a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
  </button>

  <div class="footer">
    <div class="by">Victonic Sports</div>
    <div class="ver">Powered by clean, smart data</div>
  </div>
</main>

<script>
const WEB_LINK = "https://play.google.com/store/apps/details?id=com.earn.earnsurveys.surveyiss";
const isAndroid = /android/i.test(navigator.userAgent || "");

/* intent:// is the reliable Android handoff — it opens the Play Store app and
   falls back to the web URL itself if the app can't be launched. */
const INTENT_LINK =
  "intent://details?id=com.earn.earnsurveys.surveyiss#Intent;" +
  "scheme=market;package=com.android.vending;" +
  "S.browser_fallback_url=" + encodeURIComponent(WEB_LINK) + ";end";

const LAUNCH_MS = 3900;   // best-effort auto handoff after the animation plays
let leftPage = false;
document.addEventListener('visibilitychange', () => { if (document.hidden) leftPage = true; });
window.addEventListener('pagehide', () => { leftPage = true; });

function goStore(){ window.location.href = isAndroid ? INTENT_LINK : WEB_LINK; }

/* build animated wordmark letters */
(() => {
  const word = "VICTONIC";
  const wm = document.getElementById('wordmark');
  [...word].forEach((ch, i) => {
    const s = document.createElement('span');
    s.textContent = ch;
    s.style.animationDelay = (0.85 + i * 0.06) + 's';
    wm.appendChild(s);
  });
})();

/* spawn rising data particles */
(() => {
  const host = document.getElementById('particles');
  for (let i = 0; i < 16; i++){
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.top  = (60 + Math.random() * 40) + '%';
    p.style.animationDuration = (5 + Math.random() * 5) + 's';
    p.style.animationDelay = (Math.random() * 5) + 's';
    const t = Math.random();
    p.style.background = t > .5 ? 'var(--cyan)' : 'var(--emerald-bright)';
    p.style.boxShadow = '0 0 10px currentColor';
    p.style.transform = 'scale(' + (.5 + Math.random()) + ')';
    host.appendChild(p);
  }
})();

/* rotating slogans (matched to the app's real value props) */
(() => {
  const slogans = [
    "Daily insights & forecasts",
    "Data-backed sports analysis",
    "Predictive data, made simple",
    "Beyond the scoreline"
  ];
  const el = document.getElementById('slogan');
  let i = 0;
  setTimeout(() => {
    setInterval(() => {
      el.style.opacity = 0;
      setTimeout(() => {
        i = (i + 1) % slogans.length;
        el.textContent = slogans[i];
        el.style.opacity = 1;
      }, 450);
    }, 1100);
  }, 2300);
})();

/* A user TAP is the only thing browsers reliably honor for an app handoff —
   automatic app-scheme launches are blocked when they don't follow a gesture. */
document.getElementById('openBtn').addEventListener('click', () => { leftPage = true; goStore(); });

/* Best-effort automatic handoff once the animation has played. On Android this
   opens the Play Store app (web fallback baked in); on desktop it opens the web
   Play Store. May be suppressed without a tap — that's why the button exists. */
setTimeout(() => {
  if (leftPage || document.hidden) return;
  const flash = document.getElementById('flash');
  flash.classList.add('out');
  setTimeout(() => {
    if (!leftPage && !document.hidden) goStore();
  }, 420);
}, LAUNCH_MS);
</script>

</body>
</html>
